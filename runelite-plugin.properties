displayName=Instant Replay
author=Krisisonfire
description=ShadowPlay-style instant replay for Old School RuneScape. Continuously buffers the last few seconds of gameplay and automatically saves an MP4 clip of the moments leading up to (and just after) configurable in-game events such as deaths and collection log unlocks. Clip length, framerate, resolution, post-event padding and trigger events are all configurable.
